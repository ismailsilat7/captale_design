<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Diagrams</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <main class="page-wrap">
    <p class="back-link"><a class="btn btn-secondary" href="../index.html">Back To Hub</a></p>
    <section class="hero">
      <h1>Activity Diagrams</h1>
      <p class="lead">Browse each activity diagram and download individual PNG files.</p>
    </section>

    <section class="gallery" aria-label="activity diagram images">
      <article class="diagram-item">
        <img src="cityentry-and-lobby.png" alt="City entry and lobby activity diagram">
        <h3>City Entry And Lobby</h3>
        <a class="btn btn-primary" href="cityentry-and-lobby.png" download>Download PNG</a>
      </article>

      <article class="diagram-item">
        <img src="main-game-loop.png" alt="Main game loop activity diagram">
        <h3>Main Game Loop</h3>
        <a class="btn btn-primary" href="main-game-loop.png" download>Download PNG</a>
      </article>

      <article class="diagram-item">
        <img src="car-game.png" alt="Car game activity diagram">
        <h3>Car Game</h3>
        <a class="btn btn-primary" href="car-game.png" download>Download PNG</a>
      </article>

      <article class="diagram-item">
        <img src="pong-game.png" alt="Pong game activity diagram">
        <h3>Pong Game</h3>
        <a class="btn btn-primary" href="pong-game.png" download>Download PNG</a>
      </article>

      <article class="diagram-item">
        <img src="spaceshooter-game.png" alt="Space shooter game activity diagram">
        <h3>Space Shooter Game</h3>
        <a class="btn btn-primary" href="spaceshooter-game.png" download>Download PNG</a>
      </article>
    </section>
  </main>
</body>
</html>
